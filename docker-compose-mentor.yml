version: "2.4"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_TRUST_PROXY=true
      - N8N_PROXY_HOPS=1
    volumes:
      - /var/lib/ai-data/n8n:/home/node/.n8n
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    container_name: pgvector
    environment:
      - POSTGRES_USER=ai_user
      - POSTGRES_PASSWORD=ai_password
      - POSTGRES_DB=ai_db
    volumes:
      - /var/lib/ai-data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - /var/lib/ai-models:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    runtime: nvidia
    restart: unless-stopped

  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: whisper
    runtime: nvidia
    ports:
      - "9000:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-medium
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=int8
      - WHISPER__LANGUAGE=pt
      - HF_HOME=/models/huggingface
      - WHISPER__MODEL_OFFLOAD_TIMEOUT=-1
    volumes:
      - /var/lib/ai-models:/models
      - /var/lib/ai-data/whisper:/data
    restart: unless-stopped

  # --- LibreChat (substitui Open WebUI). Porta 3000 = mesma do Open WebUI.
  # Primeira vez: criar pastas no host: sudo mkdir -p /var/lib/ai-data/librechat/{mongodb,meili_data,vectordb,uploads,logs}
  # Opcional: MEILI_MASTER_KEY e LIBRECHAT_RAG_DB_PASSWORD no .env do mentor.
  # No LibreChat (UI): Admin > Endpoints > adicionar Ollama com baseURL http://ollama:11434 (ou no host http://<mentor-ip>:11434 se acessar de fora).
  librechat-mongodb:
    image: mongo:8.0.17
    container_name: librechat-mongodb
    restart: unless-stopped
    volumes:
      - /var/lib/ai-data/librechat/mongodb:/data/db
    command: mongod --noauth

  librechat-meilisearch:
    image: getmeili/meilisearch:v1.35.1
    container_name: librechat-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_HOST=http://librechat-meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-librechat-meili-master-key}
    volumes:
      - /var/lib/ai-data/librechat/meili_data:/meili_data

  librechat-vectordb:
    image: pgvector/pgvector:pg16
    container_name: librechat-vectordb
    environment:
      - POSTGRES_DB=librechat_rag
      - POSTGRES_USER=librechat_rag
      - POSTGRES_PASSWORD=${LIBRECHAT_RAG_DB_PASSWORD:-librechat_rag_password}
    volumes:
      - /var/lib/ai-data/librechat/vectordb:/var/lib/postgresql/data
    restart: unless-stopped

  librechat-rag-api:
    image: registry.librechat.ai/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: librechat-rag-api
    environment:
      - DB_HOST=librechat-vectordb
      - DB_USER=librechat_rag
      - DB_PASSWORD=${LIBRECHAT_RAG_DB_PASSWORD:-librechat_rag_password}
      - DB_NAME=librechat_rag
      - RAG_PORT=8000
    restart: unless-stopped
    depends_on:
      - librechat-vectordb

  librechat:
    image: registry.librechat.ai/danny-avila/librechat:latest
    container_name: librechat
    ports:
      - "3000:3080"
    environment:
      - HOST=0.0.0.0
      - PORT=3080
      - MONGO_URI=mongodb://librechat-mongodb:27017/LibreChat
      - MEILI_HOST=http://librechat-meilisearch:7700
      - RAG_PORT=8000
      - RAG_API_URL=http://librechat-rag-api:8000
    volumes:
      - /var/lib/ai-data/librechat/uploads:/app/uploads
      - /var/lib/ai-data/librechat/logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - librechat-mongodb
      - librechat-meilisearch
      - librechat-rag-api
    restart: unless-stopped
